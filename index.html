<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- Always revalidate this entry document so a deploy reaches returning
     players promptly instead of serving a stale cached copy. -->
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>Starstruck</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #06081a; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
  #wrap { position: relative; width: 100%; height: 100%; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: none; }
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; pointer-events: none; color: #e8e6dc;
  }
  #hud .group { display: flex; gap: 20px; align-items: baseline; }
  #hud .label { font-size: 11px; color: #7d84a6; text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; }
  #score { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
  #best  { font-size: 15px; font-weight: 500; font-variant-numeric: tabular-nums; color: #b9bdd4; }
  #combo { font-size: 16px; font-weight: 600; color: #FAC775; opacity: 0; transition: opacity 0.15s; }
  #lives { font-size: 16px; letter-spacing: 3px; color: #E24B4A; }
  #hud button {
    pointer-events: auto; width: 36px; height: 36px; margin-left: 8px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: #e8e6dc; font-size: 15px; cursor: pointer;
  }
  #hud button:hover { background: rgba(255,255,255,0.12); }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: rgba(6,8,26,0.85); text-align: center; padding: 24px; color: #e8e6dc;
  }
  #overlay h1 { font-size: 42px; font-weight: 700; letter-spacing: 4px; }
  #overlay p  { font-size: 15px; color: #9aa0c0; max-width: 380px; line-height: 1.6; }
  #ov-score   { font-size: 17px; color: #FAC775; display: none; }
  #btn-start {
    margin-top: 8px; background: #e8e6dc; color: #06081a; border: none;
    padding: 12px 36px; font-size: 16px; font-weight: 600; border-radius: 10px; cursor: pointer;
  }
  #btn-start:hover { background: #fff; }
  #lb-wrap { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 16px; margin-top: 6px; }
  #auth { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
  #auth input {
    width: 100%; padding: 10px 12px; border-radius: 8px; text-align: center;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    color: #e8e6dc; font-size: 15px;
  }
  #auth input::placeholder { color: #7d84a6; }
  #auth button {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: none; cursor: pointer;
    background: #85B7EB; color: #06081a; font-size: 14px; font-weight: 600;
  }
  #auth button:hover { background: #a5cbf2; }
  #auth button:disabled { opacity: 0.5; cursor: default; }
  #auth .muted { font-size: 12px; color: #7d84a6; line-height: 1.5; text-align: center; }
  #auth .msg { font-size: 13px; color: #9FE1CB; text-align: center; }
  #auth .who { font-size: 13px; color: #9aa0c0; text-align: center; }
  #auth .who b { color: #e8e6dc; }
  #auth .who a { color: #85B7EB; cursor: pointer; text-decoration: underline; }
  #lb h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #7d84a6; margin-bottom: 8px; }
  #lb ol { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  #lb li {
    display: flex; align-items: baseline; font-size: 14px; padding: 5px 8px;
    border-radius: 6px; color: #b9bdd4; font-variant-numeric: tabular-nums;
  }
  #lb li .rank { color: #7d84a6; width: 22px; text-align: right; margin-right: 10px; flex: none; }
  #lb li .name { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #lb li .val { flex: none; margin-left: 10px; }
  #lb li.me { background: rgba(250,199,117,0.14); color: #FAC775; }
  #lb .empty { font-size: 13px; color: #7d84a6; text-align: center; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="group">
      <span><span class="label">Score</span><span id="score">0</span></span>
      <span><span class="label">Best</span><span id="best">0</span></span>
      <span id="combo">&times;1</span>
    </div>
    <div class="group">
      <span id="lives"></span>
      <button id="btn-sound" aria-label="Toggle sound">&#9836;</button>
      <button id="btn-pause" aria-label="Pause">&#10073;&#10073;</button>
    </div>
  </div>
  <div id="overlay">
    <h1>STARSTRUCK</h1>
    <p id="ov-sub">Steer the comet with your mouse or finger. Catch stars, chain combos up to &times;8, dodge asteroids. Gold stars grant a shield &mdash; or something better.</p>
    <p id="ov-score"></p>
    <button id="btn-start">Play</button>
    <div id="lb-wrap">
      <div id="auth"></div>
      <div id="lb">
        <h2>Global Top 10</h2>
        <div id="lb-body"><div class="empty">Loading&hellip;</div></div>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  const wrap = document.getElementById('wrap');
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const overlay = document.getElementById('overlay');
  const ovSub = document.getElementById('ov-sub');
  const ovScore = document.getElementById('ov-score');
  const btnStart = document.getElementById('btn-start');
  const btnPause = document.getElementById('btn-pause');
  const btnSound = document.getElementById('btn-sound');
  const elScore = document.getElementById('score');
  const elBest = document.getElementById('best');
  const elCombo = document.getElementById('combo');
  const elLives = document.getElementById('lives');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = wrap.clientWidth; H = wrap.clientHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    initBg();
  }
  window.addEventListener('resize', resize);

  // ---------- Audio (procedural, Web Audio API) ----------
  let AC = null, muted = false;
  function audio() {
    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (AC && AC.state === 'suspended') AC.resume();
  }
  function tone(f, dur, type, vol, slide) {
    if (muted || !AC) return;
    const t = AC.currentTime, o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(f, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, t + dur);
    g.gain.setValueAtTime(vol || 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t + dur);
  }
  function noise(dur, vol) {
    if (muted || !AC) return;
    const n = Math.floor(AC.sampleRate * dur);
    const buf = AC.createBuffer(1, n, AC.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const s = AC.createBufferSource(), g = AC.createGain();
    s.buffer = buf; g.gain.value = vol || 0.2;
    s.connect(g); g.connect(AC.destination); s.start();
  }
  const sCollect = c => { tone(440 + c * 70, 0.12, 'sine', 0.1); tone(880 + c * 140, 0.18, 'sine', 0.05); };
  const sGold = () => { tone(660, 0.3, 'triangle', 0.12, 1320); tone(990, 0.4, 'sine', 0.06, 1980); };
  const sHit = () => { noise(0.25, 0.25); tone(140, 0.3, 'sawtooth', 0.1, 60); };
  const sFrenzy = () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.25, 'triangle', 0.1), i * 80));
  const sOver = () => [440, 349, 294, 220].forEach((f, i) => setTimeout(() => tone(f, 0.35, 'triangle', 0.1), i * 140));

  // ---------- State ----------
  let running = false, paused = false, best = 0;
  try { best = parseInt(localStorage.getItem('starstruck-best') || '0', 10) || 0; } catch (e) {}
  let score = 0, lives = 3, shield = false;
  let combo = 1, comboT = 0, frenzy = 0, inv = 0, elapsed = 0, shake = 0;
  let px = 0, py = 0, tx = 0, ty = 0;
  let trail = [], stars = [], rocks = [], parts = [], pops = [], bg = [];
  let spawnS = 0, spawnR = 0;

  function initBg() {
    bg = [];
    for (let i = 0; i < Math.floor(W * H / 9000); i++) {
      bg.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.4 + 0.3, s: Math.random() * 12 + 4, tw: Math.random() * 6.28 });
    }
  }
  resize();

  // ---------- Input: pointer + keyboard ----------
  function setPointer(e) {
    const r = wrap.getBoundingClientRect(), p = e.touches ? e.touches[0] : e;
    tx = p.clientX - r.left; ty = p.clientY - r.top;
  }
  wrap.addEventListener('mousemove', setPointer);
  wrap.addEventListener('touchmove', e => { e.preventDefault(); setPointer(e); }, { passive: false });
  wrap.addEventListener('touchstart', setPointer, { passive: true });
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') togglePause();
    if ((e.key === ' ' || e.key === 'Enter') && !running && overlay.style.display !== 'none') btnStart.click();
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  function reset() {
    score = 0; lives = 3; shield = false; combo = 1; comboT = 0;
    frenzy = 0; inv = 0; elapsed = 0; shake = 0;
    stars = []; rocks = []; parts = []; pops = []; trail = [];
    px = tx = W / 2; py = ty = H * 0.7;
    spawnS = 0; spawnR = 2;
    updateHud();
  }
  function updateHud() {
    elScore.textContent = Math.round(score).toLocaleString();
    elBest.textContent = Math.round(best).toLocaleString();
    elLives.textContent = '\u2665'.repeat(Math.max(0, lives));
    if (combo > 1) { elCombo.style.opacity = 1; elCombo.innerHTML = '&times;' + combo; }
    else elCombo.style.opacity = 0;
  }

  // ---------- Spawning ----------
  function spawnStar(forceGold) {
    const g = forceGold || Math.random() < 0.045;
    stars.push({
      x: Math.random() * (W - 40) + 20, y: -14,
      vy: 28 + Math.random() * 24 + elapsed * 0.5,
      vx: (Math.random() - 0.5) * 20,
      r: g ? 10 : 7, gold: g, tw: Math.random() * 6.28
    });
  }
  function spawnRock() {
    const side = Math.random(); let x, y, a;
    if (side < 0.6) { x = Math.random() * W; y = -20; a = Math.PI / 2 + (Math.random() - 0.5) * 0.9; }
    else if (side < 0.8) { x = -20; y = Math.random() * H * 0.7; a = (Math.random() - 0.5) * 0.7; }
    else { x = W + 20; y = Math.random() * H * 0.7; a = Math.PI + (Math.random() - 0.5) * 0.7; }
    const sp = 60 + Math.random() * 50 + Math.min(elapsed * 2.2, 150);
    const r = 10 + Math.random() * 15;
    const pts = [];
    const n = 7 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) pts.push(r * (0.7 + Math.random() * 0.45));
    rocks.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r, rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 2, pts });
  }
  function burst(x, y, col, n, sp) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * 6.28, v = (Math.random() * 0.7 + 0.3) * (sp || 120);
      parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: 0.6 + Math.random() * 0.4, t: 0, col, r: 1.5 + Math.random() * 2.5 });
    }
  }
  const pop = (x, y, txt, col) => pops.push({ x, y, txt, col, t: 0 });

  // ---------- Main loop ----------
  let last = 0;
  function loop(ts) {
    if (!running) return;
    requestAnimationFrame(loop);
    if (paused) return;
    if (!last) last = ts;
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts; elapsed += dt;

    // Keyboard nudges the target so both schemes coexist
    const ks = 380 * dt;
    if (keys.ArrowLeft || keys.a) tx -= ks;
    if (keys.ArrowRight || keys.d) tx += ks;
    if (keys.ArrowUp || keys.w) ty -= ks;
    if (keys.ArrowDown || keys.s) ty += ks;
    tx = Math.max(0, Math.min(W, tx)); ty = Math.max(0, Math.min(H, ty));

    px += (tx - px) * Math.min(1, dt * 10);
    py += (ty - py) * Math.min(1, dt * 10);
    px = Math.max(10, Math.min(W - 10, px));
    py = Math.max(10, Math.min(H - 10, py));

    trail.push({ x: px, y: py, t: 0 });
    for (let i = trail.length - 1; i >= 0; i--) { trail[i].t += dt; if (trail[i].t > 0.45) trail.splice(i, 1); }

    spawnS -= dt;
    const sRate = frenzy > 0 ? 0.09 : Math.max(0.32, 0.85 - elapsed * 0.006);
    if (spawnS <= 0) { spawnStar(); spawnS = sRate; }
    if (frenzy <= 0) {
      spawnR -= dt;
      if (spawnR <= 0) { spawnRock(); spawnR = Math.max(0.5, 2.1 - elapsed * 0.016); }
    }
    frenzy = Math.max(0, frenzy - dt);
    inv = Math.max(0, inv - dt);
    shake = Math.max(0, shake - dt * 30);
    if (combo > 1) { comboT -= dt; if (comboT <= 0) { combo = 1; updateHud(); } }

    // Stars
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      s.y += s.vy * dt; s.x += s.vx * dt; s.tw += dt * 5;
      if (s.y > H + 20) { stars.splice(i, 1); continue; }
      const dx = s.x - px, dy = s.y - py;
      if (dx * dx + dy * dy < (s.r + 14) * (s.r + 14)) {
        stars.splice(i, 1);
        if (s.gold) {
          if (Math.random() < 0.35 && frenzy <= 0) {
            frenzy = 5; sFrenzy();
            pop(s.x, s.y, 'STARSTRUCK!', '#FAC775');
            burst(s.x, s.y, '#FAC775', 30, 180);
          } else {
            shield = true; sGold();
            pop(s.x, s.y, 'Shield', '#9FE1CB');
            burst(s.x, s.y, '#9FE1CB', 20, 140);
          }
        } else {
          combo = comboT > 0 ? Math.min(8, combo + 1) : 1;
          comboT = 2;
          const pts = 10 * combo;
          score += pts;
          sCollect(combo);
          pop(s.x, s.y, '+' + pts, combo >= 4 ? '#FAC775' : '#F1EFE8');
          burst(s.x, s.y, '#FAC775', 8, 100);
        }
        updateHud();
      }
    }

    // Rocks
    for (let i = rocks.length - 1; i >= 0; i--) {
      const r = rocks[i];
      r.x += r.vx * dt; r.y += r.vy * dt; r.rot += r.vr * dt;
      if (r.y > H + 40 || r.x < -50 || r.x > W + 50) { rocks.splice(i, 1); continue; }
      const dx = r.x - px, dy = r.y - py;
      if (inv <= 0 && dx * dx + dy * dy < (r.r + 9) * (r.r + 9)) {
        rocks.splice(i, 1);
        burst(r.x, r.y, '#F0997B', 24, 160);
        shake = 8;
        if (shield) {
          shield = false; inv = 1;
          tone(300, 0.2, 'square', 0.08, 150);
          pop(px, py - 20, 'Shield lost', '#9FE1CB');
        } else {
          lives--; inv = 2; combo = 1; comboT = 0;
          sHit();
          pop(px, py - 20, 'Ouch', '#F09595');
          if (lives <= 0) { updateHud(); gameOver(); return; }
        }
        updateHud();
      }
    }

    for (let i = parts.length - 1; i >= 0; i--) {
      const p = parts[i]; p.t += dt;
      if (p.t > p.life) { parts.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.98; p.vy *= 0.98;
    }
    for (let i = pops.length - 1; i >= 0; i--) {
      pops[i].t += dt; pops[i].y -= 30 * dt;
      if (pops[i].t > 0.9) pops.splice(i, 1);
    }

    score += dt * 2;
    if (Math.floor(score) % 5 === 0) updateHud();
    draw();
  }

  // ---------- Rendering ----------
  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    ctx.fillStyle = frenzy > 0 ? '#100c26' : '#06081a';
    ctx.fillRect(-10, -10, W + 20, H + 20);

    const now = performance.now();
    for (const b of bg) {
      b.y += b.s * 0.016; if (b.y > H) b.y = 0;
      ctx.globalAlpha = 0.35 + 0.3 * Math.sin(b.tw + now / 700);
      ctx.fillStyle = '#8a92b8';
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.28); ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const t of trail) {
      const a = 1 - t.t / 0.45;
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = frenzy > 0 ? '#FAC775' : '#85B7EB';
      ctx.beginPath(); ctx.arc(t.x, t.y, 9 * a, 0, 6.28); ctx.fill();
    }
    ctx.globalAlpha = 1;

    for (const s of stars) drawStar(s.x, s.y, s.r + Math.sin(s.tw) * 1.2, s.gold ? '#FAC775' : '#F1EFE8', s.tw * 0.4);

    for (const r of rocks) {
      ctx.save(); ctx.translate(r.x, r.y); ctx.rotate(r.rot);
      ctx.fillStyle = '#4a4f66'; ctx.strokeStyle = '#6b7190'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let j = 0; j < r.pts.length; j++) {
        const a = j / r.pts.length * 6.28, rr = r.pts[j];
        j === 0 ? ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr) : ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    }

    for (const p of parts) {
      ctx.globalAlpha = 1 - p.t / p.life;
      ctx.fillStyle = p.col;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill();
    }
    ctx.globalAlpha = 1;

    const blink = inv > 0 && Math.floor(inv * 10) % 2 === 0;
    if (!blink) {
      ctx.save(); ctx.translate(px, py);
      if (shield) {
        ctx.strokeStyle = '#9FE1CB'; ctx.lineWidth = 2;
        ctx.globalAlpha = 0.7 + 0.3 * Math.sin(now / 150);
        ctx.beginPath(); ctx.arc(0, 0, 16, 0, 6.28); ctx.stroke();
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = frenzy > 0 ? '#FAC775' : '#F1EFE8';
      ctx.beginPath(); ctx.arc(0, 0, 8, 0, 6.28); ctx.fill();
      ctx.fillStyle = frenzy > 0 ? '#EF9F27' : '#85B7EB';
      ctx.beginPath(); ctx.arc(-3, 3, 3.5, 0, 6.28); ctx.fill();
      ctx.restore();
    }

    ctx.font = '600 15px system-ui, sans-serif';
    ctx.textAlign = 'center';
    for (const p of pops) {
      ctx.globalAlpha = 1 - p.t / 0.9;
      ctx.fillStyle = p.col;
      ctx.fillText(p.txt, p.x, p.y);
    }
    ctx.globalAlpha = 1;

    if (frenzy > 0) {
      ctx.fillStyle = '#FAC775';
      ctx.fillRect(0, H - 4, W * (frenzy / 5), 4);
    }
    ctx.restore();
  }

  function drawStar(x, y, r, col, rot) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
    ctx.fillStyle = col;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = i / 10 * 6.28 - Math.PI / 2;
      const rr = i % 2 === 0 ? r : r * 0.45;
      ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // ---------- Flow ----------
  function gameOver() {
    running = false;
    sOver();
    best = Math.max(best, Math.round(score));
    try { localStorage.setItem('starstruck-best', String(best)); } catch (e) {}
    if (window.Leaderboard && window.Leaderboard.ready) window.Leaderboard.submit(Math.round(score));
    updateHud();
    overlay.style.display = 'flex';
    ovSub.textContent = 'The stars have dimmed. One more run?';
    ovScore.style.display = 'block';
    ovScore.textContent = 'Score ' + Math.round(score).toLocaleString() + ' \u00b7 Best ' + best.toLocaleString();
    btnStart.textContent = 'Play again';
  }
  function togglePause() {
    if (!running) return;
    paused = !paused; last = 0;
    btnPause.innerHTML = paused ? '&#9654;' : '&#10073;&#10073;';
  }

  btnStart.addEventListener('click', () => {
    audio();
    overlay.style.display = 'none';
    reset();
    running = true; paused = false; last = 0;
    btnPause.innerHTML = '&#10073;&#10073;';
    requestAnimationFrame(loop);
  });
  btnPause.addEventListener('click', togglePause);
  btnSound.addEventListener('click', () => {
    muted = !muted;
    btnSound.innerHTML = muted ? '&#9834;&#824;' : '&#9836;';
  });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !paused) togglePause();
  });

  updateHud();
  draw();
})();
</script>

<!-- ---------- Global leaderboard (Supabase) ---------- -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
(function () {
  // Public config. The anon key is designed to be shipped in the browser;
  // row-level security in supabase/schema.sql is what actually guards the data.
  const SUPABASE_URL = 'https://jgmuyhkfnmfwskfekoet.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_K86KGPDw3jeqWKdvTz0K3g_9csYeQ1-';

  const authEl = document.getElementById('auth');
  const lbBody = document.getElementById('lb-body');

  const esc = s => String(s).replace(/[<>&"]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]));

  // Stay inert (game still fully playable) until real credentials are wired in.
  const configured = SUPABASE_URL.indexOf('http') === 0 && SUPABASE_ANON_KEY.length > 20;
  if (!configured || !window.supabase) {
    authEl.innerHTML = '<span class="muted">Global leaderboard coming soon.</span>';
    lbBody.innerHTML = '';
    window.Leaderboard = { ready: false, submit: function () {} };
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, detectSessionInUrl: true, autoRefreshToken: true }
  });

  let session = null, profile = null, pendingScore = 0;

  async function refreshProfile() {
    profile = null;
    if (!session) return;
    const { data } = await sb.from('profiles').select('username').eq('id', session.user.id).maybeSingle();
    profile = data || null;
  }

  function renderAuth(msg) {
    const note = msg ? '<span class="msg">' + esc(msg) + '</span>' : '';
    if (!session) {
      authEl.innerHTML =
        '<input id="au-email" type="email" placeholder="you@email.com" autocomplete="email">' +
        '<button id="au-send">Email me a login link</button>' +
        (msg ? note : '<span class="muted">Sign in to save your scores to the global leaderboard.</span>');
      const send = document.getElementById('au-send');
      send.onclick = sendLink;
      document.getElementById('au-email').onkeydown = e => { if (e.key === 'Enter') sendLink(); };
    } else if (!profile) {
      authEl.innerHTML =
        '<input id="au-name" placeholder="Pick a username" maxlength="16" autocomplete="off">' +
        '<button id="au-save">Save username</button>' +
        (msg ? note : '<span class="muted">Choose a name for the leaderboard (3&ndash;16 characters).</span>');
      document.getElementById('au-save').onclick = saveName;
      document.getElementById('au-name').onkeydown = e => { if (e.key === 'Enter') saveName(); };
    } else {
      authEl.innerHTML =
        '<span class="who">Signed in as <b>' + esc(profile.username) + '</b> &middot; <a id="au-out">sign out</a></span>' + note;
      document.getElementById('au-out').onclick = () => sb.auth.signOut();
    }
  }

  async function sendLink() {
    const email = (document.getElementById('au-email').value || '').trim();
    if (!email) return;
    const btn = document.getElementById('au-send');
    btn.disabled = true; btn.textContent = 'Sending…';
    const { error } = await sb.auth.signInWithOtp({
      email, options: { emailRedirectTo: location.origin + location.pathname }
    });
    renderAuth(error ? 'Error: ' + error.message : 'Check ' + email + ' for your login link.');
  }

  async function saveName() {
    const username = (document.getElementById('au-name').value || '').trim();
    if (username.length < 3) { renderAuth('Name must be at least 3 characters.'); return; }
    document.getElementById('au-save').disabled = true;
    const { error } = await sb.from('profiles').insert({ id: session.user.id, username });
    if (error) {
      renderAuth(error.code === '23505' ? 'That name is taken — try another.' : 'Error: ' + error.message);
      return;
    }
    await refreshProfile();
    renderAuth();
    if (pendingScore > 0) { await submitScore(pendingScore); pendingScore = 0; }
    loadBoard();
  }

  async function submitScore(score) {
    if (!session || !profile || !score) return;
    const { error } = await sb.from('scores').insert({ user_id: session.user.id, score: Math.round(score) });
    if (!error) { renderAuth('Saved your score of ' + Math.round(score).toLocaleString() + '!'); loadBoard(); }
  }

  async function loadBoard() {
    const { data, error } = await sb
      .from('leaderboard').select('username,best_score')
      .order('best_score', { ascending: false }).limit(10);
    if (error) { lbBody.innerHTML = '<div class="empty">Leaderboard unavailable.</div>'; return; }
    if (!data || !data.length) { lbBody.innerHTML = '<div class="empty">No scores yet &mdash; be the first!</div>'; return; }
    const mine = profile ? profile.username : null;
    lbBody.innerHTML = '<ol>' + data.map((r, i) =>
      '<li class="' + (r.username === mine ? 'me' : '') + '">' +
      '<span class="rank">' + (i + 1) + '</span>' +
      '<span class="name">' + esc(r.username) + '</span>' +
      '<span class="val">' + Number(r.best_score).toLocaleString() + '</span></li>'
    ).join('') + '</ol>';
  }

  // Called by the game on game over.
  window.Leaderboard = {
    ready: true,
    submit: function (score) {
      score = Math.round(score);
      if (session && profile) submitScore(score);
      else if (session) { pendingScore = score; renderAuth('Pick a username to save your score of ' + score.toLocaleString() + '.'); }
      else renderAuth('Sign in to save your score of ' + score.toLocaleString() + '.');
    }
  };

  // Defer Supabase calls out of the callback: it runs while supabase-js holds
  // its internal auth lock, and any awaited DB call here would re-acquire that
  // lock and deadlock (leaderboard stuck on "Loading…"). setTimeout releases
  // the lock first. See supabase-js onAuthStateChange docs.
  sb.auth.onAuthStateChange((_evt, s) => {
    session = s;
    if (location.hash.indexOf('access_token') !== -1) history.replaceState(null, '', location.pathname);
    setTimeout(async () => {
      await refreshProfile();
      renderAuth();
      loadBoard();
    }, 0);
  });

  loadBoard();
})();
</script>
</body>
</html>
